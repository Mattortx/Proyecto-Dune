<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dune: Casa Portil - Guardians of the Water</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a0f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 3px solid #c9a66b;
            box-shadow: 0 0 20px rgba(201, 166, 107, 0.5);
        }
        
        canvas {
            display: block;
            background: #2d1f14;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #c9a66b;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        .hud-panel {
            background: rgba(26, 15, 10, 0.8);
            padding: 8px 12px;
            border: 2px solid #c9a66b;
            border-radius: 5px;
        }
        
        #waterBar {
            width: 150px;
            height: 20px;
            background: #3d2b1f;
            border: 2px solid #c9a66b;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        #waterFill {
            height: 100%;
            background: linear-gradient(90deg, #4a90e2, #5ba3f5);
            transition: width 0.3s;
        }
        
        #dialogueBox {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: rgba(26, 15, 10, 0.95);
            border: 2px solid #c9a66b;
            border-radius: 5px;
            padding: 15px;
            color: #e8d5b7;
            font-size: 16px;
            display: none;
            pointer-events: auto;
        }
        
        #dialogueBox .speaker {
            color: #c9a66b;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        #questLog {
            position: absolute;
            top: 60px;
            right: 10px;
            width: 250px;
            background: rgba(26, 15, 10, 0.9);
            border: 2px solid #c9a66b;
            border-radius: 5px;
            padding: 10px;
            color: #e8d5b7;
            font-size: 12px;
            display: none;
        }
        
        #questLog h3 {
            color: #c9a66b;
            margin-bottom: 10px;
            border-bottom: 1px solid #c9a66b;
            padding-bottom: 5px;
        }
        
        .quest-item {
            margin: 5px 0;
            padding: 5px;
            background: rgba(201, 166, 107, 0.1);
            border-radius: 3px;
        }
        
        #mainMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 15, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #c9a66b;
            pointer-events: auto;
        }
        
        #mainMenu h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(201, 166, 107, 0.5);
        }
        
        #mainMenu h2 {
            font-size: 18px;
            margin-bottom: 40px;
            color: #e8d5b7;
        }
        
        .menu-btn {
            background: #3d2b1f;
            border: 2px solid #c9a66b;
            color: #c9a66b;
            padding: 12px 30px;
            margin: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .menu-btn:hover {
            background: #c9a66b;
            color: #1a0f0a;
        }
        
        #inventory {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
        }
        
        .inv-slot {
            width: 50px;
            height: 50px;
            background: rgba(26, 15, 10, 0.9);
            border: 2px solid #c9a66b;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e8d5b7;
            font-size: 24px;
        }
        
        #minimap {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            background: rgba(26, 15, 10, 0.9);
            border: 2px solid #c9a66b;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .loading-text {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="hud">
                <div class="hud-panel">
                    <div>💧 Water: <span id="waterCount">100</span>/100</div>
                    <div id="waterBar"><div id="waterFill" style="width: 100%"></div></div>
                </div>
                <div class="hud-panel">
                    <div>📍 <span id="location">Casa Portil Palace</span></div>
                </div>
                <div class="hud-panel">
                    <div>⚡ Credits: <span id="credits">500</span></div>
                </div>
            </div>
            
            <div id="dialogueBox">
                <div class="speaker"></div>
                <div class="text"></div>
                <div style="margin-top: 10px; font-size: 12px; color: #8b7355;">[SPACE] to continue</div>
            </div>
            
            <div id="questLog">
                <h3>📜 Active Quests</h3>
                <div class="quests"></div>
            </div>
            
            <div id="inventory">
                <div class="inv-slot" id="slot0"></div>
                <div class="inv-slot" id="slot1"></div>
                <div class="inv-slot" id="slot2"></div>
                <div class="inv-slot" id="slot3"></div>
                <div class="inv-slot" id="slot4"></div>
            </div>
            
            <canvas id="minimap"></canvas>
            
            <div id="mainMenu">
                <h1>🏜️ DUNE: CASA PORTIL</h1>
                <h2>Guardians of the Water</h2>
                <button class="menu-btn" onclick="startGame()">Start Game</button>
                <button class="menu-btn" onclick="showHelp()">Help</button>
                <button class="menu-btn" onclick="showLore()">Lore</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
