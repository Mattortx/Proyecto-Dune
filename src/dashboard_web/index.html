<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dune Data Observatory</title>
  <style>
    :root {
      --bg: #0b1317;
      --bg-soft: #112028;
      --card: #182b34;
      --line: #264451;
      --text: #d9edf5;
      --muted: #8db0bf;
      --ok: #58c28d;
      --warn: #e3c35f;
      --err: #f57c7c;
      --accent: #7ee4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #1c3947 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, #103545 0%, transparent 35%),
        linear-gradient(160deg, var(--bg), #071015 65%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    .hero {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(24, 43, 52, 0.88), rgba(11, 19, 23, 0.92));
      padding: 1.5rem;
      border-radius: 16px;
      margin-bottom: 1rem;
      backdrop-filter: blur(2px);
    }

    .hero h1 {
      margin: 0;
      letter-spacing: 0.08em;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      text-transform: uppercase;
    }

    .hero p {
      margin: 0.7rem 0 0;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      background: rgba(24, 43, 52, 0.8);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.45s ease both;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.82rem;
    }

    .panel-body {
      padding: 1rem;
    }

    .activity-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 38vh;
      overflow: auto;
    }

    .activity-item {
      border: 1px solid rgba(38, 68, 81, 0.9);
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      background: rgba(17, 32, 40, 0.65);
    }

    .activity-top {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: baseline;
      margin-bottom: 0.35rem;
    }

    .activity-tag {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 700;
    }

    .activity-time {
      color: var(--muted);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .activity-msg {
      margin: 0;
      color: var(--text);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .activity-meta {
      margin-top: 0.35rem;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .activity-empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.25rem 0;
    }

    button {
      border: 1px solid var(--line);
      background: var(--bg-soft);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    #timestamp {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .card {
      border: 1px solid var(--line);
      background: rgba(24, 43, 52, 0.8);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.45s ease both;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.82rem;
    }

    .badge {
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .badge.ok {
      background: rgba(88, 194, 141, 0.2);
      color: var(--ok);
    }

    .badge.warn {
      background: rgba(227, 195, 95, 0.2);
      color: var(--warn);
    }

    .badge.err {
      background: rgba(245, 124, 124, 0.2);
      color: var(--err);
    }

    .card-body {
      padding: 1rem;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      border: 1px solid rgba(38, 68, 81, 0.65);
      border-radius: 10px;
      background: rgba(11, 19, 23, 0.45);
    }

    .kpi {
      font-size: 1.5rem;
      margin-bottom: 0.7rem;
      color: var(--accent);
      font-weight: 700;
    }

    .msg {
      margin: 0 0 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
      font-size: 0.9rem;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    th,
    td {
      border-bottom: 1px solid rgba(38, 68, 81, 0.8);
      text-align: left;
      padding: 0.35rem;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.5rem 0;
    }

    .error-box {
      margin-top: 1rem;
      border: 1px solid rgba(245, 124, 124, 0.35);
      background: rgba(245, 124, 124, 0.08);
      color: #ffd6d6;
      border-radius: 10px;
      padding: 0.8rem;
      display: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .activity-list {
        max-height: 320px;
      }

      table {
        min-width: 760px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>Dune Data Observatory</h1>
      <p>Vista agregada de Firebase, Supabase y Neon para seguimiento operativo.</p>
    </section>

    <div class="controls">
      <button id="refresh" type="button">Actualizar datos</button>
      <button id="clear-activity" type="button">Limpiar registro</button>
      <span id="timestamp">Sin datos</span>
    </div>

    <div class="workspace">
      <section>
        <section id="grid" class="grid"></section>
        <section id="error" class="error-box"></section>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <span>Registro de actividad</span>
          <span id="activity-count">0 eventos</span>
        </div>
        <div class="panel-body">
          <ul id="activity-list" class="activity-list"></ul>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const timestamp = document.getElementById("timestamp");
    const errorBox = document.getElementById("error");
    const refreshButton = document.getElementById("refresh");
    const clearActivityButton = document.getElementById("clear-activity");
    const activityList = document.getElementById("activity-list");
    const activityCount = document.getElementById("activity-count");
    const activityStorageKey = "dune-dashboard-activity-log";
    let activityEntries = [];

    function nowLabel() {
      return new Date().toLocaleString();
    }

    function loadActivityEntries() {
      try {
        const raw = localStorage.getItem(activityStorageKey);
        activityEntries = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(activityEntries)) {
          activityEntries = [];
        }
      } catch {
        activityEntries = [];
      }
    }

    function saveActivityEntries() {
      localStorage.setItem(activityStorageKey, JSON.stringify(activityEntries));
    }

    function logActivity(tag, message, meta = "") {
      activityEntries.unshift({
        tag,
        message,
        meta,
        time: nowLabel(),
      });
      activityEntries = activityEntries.slice(0, 120);
      saveActivityEntries();
      renderActivity();
    }

    function renderActivity() {
      activityList.innerHTML = "";
      activityCount.textContent = `${activityEntries.length} evento${activityEntries.length === 1 ? "" : "s"}`;

      if (activityEntries.length === 0) {
        activityList.innerHTML = '<li class="activity-empty">Todavía no hay acciones registradas.</li>';
        return;
      }

      activityEntries.forEach((entry) => {
        const item = document.createElement("li");
        item.className = "activity-item";
        item.innerHTML = `
          <div class="activity-top">
            <span class="activity-tag">${escapeHtml(entry.tag)}</span>
            <span class="activity-time">${escapeHtml(entry.time)}</span>
          </div>
          <p class="activity-msg">${escapeHtml(entry.message)}</p>
          ${entry.meta ? `<div class="activity-meta">${escapeHtml(entry.meta)}</div>` : ""}
        `;
        activityList.appendChild(item);
      });
    }

    function statusClass(status) {
      if (status === "ok") return "ok";
      if (status === "not_configured") return "warn";
      return "err";
    }

    function toCell(value) {
      if (value === null || value === undefined) return "-";
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        return '<div class="empty">Sin filas para mostrar.</div>';
      }

      const columns = Object.keys(rows[0]);
      const header = columns.map((col) => `<th>${col}</th>`).join("");
      const body = rows
        .slice(0, 10)
        .map((row) => {
          const tds = columns.map((col) => `<td>${toCell(row[col])}</td>`).join("");
          return `<tr>${tds}</tr>`;
        })
        .join("");

      return `<div class="table-wrap"><table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
    }

    function renderSources(sources) {
      grid.innerHTML = "";
      sources.forEach((source, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.style.animationDelay = `${index * 0.08}s`;

        card.innerHTML = `
          <header class="card-head">
            <span>${escapeHtml(source.source)}</span>
            <span class="badge ${statusClass(source.status)}">${escapeHtml(source.status)}</span>
          </header>
          <div class="card-body">
            <div class="kpi">${source.total ?? "-"}</div>
            <p class="msg">${escapeHtml(source.message ?? "Conectado correctamente")}</p>
            ${renderTable(source.rows)}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    async function loadOverview() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
      logActivity("system", "Solicitando datos consolidados", "Actualizando Firebase, Supabase y Neon");

      try {
        const response = await fetch("/api/overview", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderSources(data.sources || []);
        const date = data.generated_at ? new Date(data.generated_at) : new Date();
        timestamp.textContent = `Actualizado: ${date.toLocaleString()}`;

        (data.sources || []).forEach((source) => {
          const totalLabel = source.total === null || source.total === undefined ? "sin total" : `${source.total} registros`;
          const message = source.status === "ok" ? "Carga correcta" : source.status === "not_configured" ? "No configurado" : "Con error";
          logActivity(
            source.source,
            `${message} en ${source.source}`,
            `${totalLabel}${source.message ? ` · ${source.message}` : ""}`
          );
        });
      } catch (error) {
        errorBox.style.display = "block";
        errorBox.textContent = `No se pudo cargar /api/overview: ${error.message}`;
        logActivity("error", "Fallo al cargar el dashboard", error.message);
      }
    }

    clearActivityButton.addEventListener("click", () => {
      activityEntries = [];
      saveActivityEntries();
      renderActivity();
      logActivity("system", "Registro limpiado", "Se eliminaron los eventos previos");
    });

    refreshButton.addEventListener("click", loadOverview);
    loadActivityEntries();
    renderActivity();
    logActivity("system", "Dashboard abierto", "Se cargó la vista principal");
    loadOverview();
  </script>
</body>
</html>
